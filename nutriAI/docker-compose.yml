version: '3.8'

services:
  # Banco de Dados
  db:
    image: postgres:15
    container_name: nutriai_db_container
    restart: always
    environment:
      # Ele lê as variáveis do .env da pasta app automaticamente se apontarmos
      POSTGRES_USER: nutriai_user
      POSTGRES_PASSWORD: 123456
      POSTGRES_DB: nutriai_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # Backend (FastAPI)
  backend:
    build: ./app
    container_name: nutriai_backend
    restart: always
    ports:
      - "8000:8000"
    env_file:
      - ./app/.env
    depends_on:
      - db

  # Frontend (Next.js)
  frontend:
    build: ./nutriAI
    container_name: nutriai_frontend
    restart: always
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres_data: